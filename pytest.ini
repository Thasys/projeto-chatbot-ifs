[pytest]
# Configuração do Pytest

# Diretório raiz dos testes
testpaths = tests

# Padrão de arquivos de teste
python_files = test_*.py

# Padrão de classes de teste
python_classes = Test*

# Padrão de funções de teste
python_functions = test_*

# Adicionar opções de linha de comando
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Marcadores customizados
markers =
    unit: marca testes unitários (rápidos, sem dependências externas)
    integration: marca testes de integração (mais lentos, podem usar BD)
    slow: marca testes lentos
    requires_db: marca testes que precisam de banco de dados real

# Diretório de cache
cache_dir = .pytest_cache

# Cobertura
# Para usar: pytest --cov=. --cov-report=html

# Timeout (em segundos, requer pytest-timeout)
# timeout = 300
