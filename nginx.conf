user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss;

    # ========== UPSTREAM: Define grupo de servidores da app ==========
    upstream ifs_app {
        least_conn;  # Algoritmo: least connections (menos conexões ativas)
        server app1:8501 weight=1 max_fails=3 fail_timeout=30s;
        server app2:8501 weight=1 max_fails=3 fail_timeout=30s;
        
        # Keepalive para performance
        keepalive 32;
    }

    # ========== HTTP (Redirecionamento para HTTPS) ==========
    server {
        listen 80;
        server_name _;

        # Health check endpoint para load balancer
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Redirecionar HTTP para HTTPS (descomente quando tiver SSL)
        # return 301 https://$host$request_uri;

        # Proxy para a app (sem HTTPS por enquanto)
        location / {
            proxy_pass http://ifs_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
            
            # Timeouts para Streamlit
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering desabilitado para streaming (Streamlit precisa)
            proxy_buffering off;
        }

        # Servir arquivos estáticos (cache)
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://ifs_app;
            proxy_cache_valid 200 30d;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Block invalid requests
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

